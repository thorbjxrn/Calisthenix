name: Calisthenix
options:
  bundleIdPrefix: thorbjxrn
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

settings:
  base:
    DEVELOPMENT_TEAM: 228DC29L7W
    SWIFT_VERSION: "6.0"

schemes:
  Calisthenix:
    build:
      targets:
        Calisthenix: all
        CalisthenixTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CalisthenixTests

targets:
  Calisthenix:
    type: application
    platform: iOS
    sources:
      - path: Calisthenix
        excludes:
          - "Preview Content/**"
    resources:
      - path: Calisthenix/Assets.xcassets
      - path: Calisthenix/Preview Content
        optional: true
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Calisthenix
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_BUNDLE_IDENTIFIER: thorbjxrn.Calisthenix
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"

  CalisthenixTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CalisthenixTests
    dependencies:
      - target: Calisthenix
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: thorbjxrn.CalisthenixTests
        GENERATE_INFOPLIST_FILE: YES
